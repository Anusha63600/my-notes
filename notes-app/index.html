<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>My Notes</h1>
    <button id="modeBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <input type="text" id="searchInput" placeholder="Search notes..." onkeyup="searchNotes()"/>
    <input type="text" id="noteInput" placeholder="Write your note...">
    <button onclick="addNote()">Add Note</button>
    
    <ul id="notesList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
